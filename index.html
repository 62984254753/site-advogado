<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imersão Advogado de Sucesso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50">

<div class="max-w-xl mx-auto mt-20 bg-white p-8 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-6 text-center">
Garanta sua vaga agora
</h1>

<form id="registration-form" class="space-y-4">

<input required name="nome" type="text" placeholder="Nome" class="w-full p-3 border rounded">

<input required name="email" type="email" placeholder="Email" class="w-full p-3 border rounded">

<input required name="whatsapp" type="tel" placeholder="WhatsApp" class="w-full p-3 border rounded">

<button type="submit" class="w-full bg-emerald-500 text-white p-4 rounded font-bold">
REALIZAR INSCRIÇÃO AGORA
</button>

</form>

</div>

<script>

const form = document.getElementById('registration-form');

form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const button = form.querySelector('button');
    const original = button.innerText;

    button.disabled = true;
    button.innerText = 'Gerando pagamento...';

    try {

        const formData = new FormData(form);

        const data = {
            nome: formData.get('nome'),
            email: formData.get('email'),
            whatsapp: formData.get('whatsapp')
        };

        const response = await fetch('https://mercado-pago-backend-seven.vercel.app/api/create-preference', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (result.init_point) {
            window.location.href = result.init_point;
        } else {
            alert('Erro ao gerar pagamento');
        }

    } catch (error) {
        alert('Erro na conexão');
    }

    button.disabled = false;
    button.innerText = original;

});

</script>

</body>
</html>
